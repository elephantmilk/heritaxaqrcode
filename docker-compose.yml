services:
  app:
    build: .
    expose:
      - "80"
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-admin}
    volumes:
      - heritaxaqr-data:/var/www/html/data
      - heritaxaqr-uploads:/var/www/html/assets/uploads
    networks:
      - dokploy-network
    restart: unless-stopped

volumes:
  heritaxaqr-data:
  heritaxaqr-uploads:

networks:
  dokploy-network:
    external: true
